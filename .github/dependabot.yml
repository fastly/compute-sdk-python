version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/examples/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/crates/wasiless"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
