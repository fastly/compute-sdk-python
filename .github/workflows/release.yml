name: Release

# Triggers:
#   - Push a version tag (e.g. git tag v0.1.0 && git push --tags) for a real release.
#   - workflow_dispatch for ad-hoc test builds without creating a tag.
#     Wheels are uploaded as GitHub Actions artifacts and no GitHub Release is created.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for artifacts (e.g. v0.1.0-test)"
        required: true
        default: "v0.0.0-dev"

# Minimal permissions by default; create-github-release job adds write where needed.
permissions:
  contents: read

env:
  # Bump these in one place when upgrading toolchains or maturin.
  PYTHON_VERSION: "3.12"
  RUST_STABLE: "1.92.0"  # pinned; see comment in build-linux
  MATURIN_VERSION: "v1.13.3"

jobs:
  # Verify that the versions in pyproject.toml and Cargo.toml match the tag
  # (or the manually-supplied version label) before spending time on builds.
  # For workflow_dispatch runs the version input is used; for tag pushes the
  # tag itself is used.
  check-version:
    name: "Check version consistency"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify versions match
        run: |
          python scripts/check_version_sync.py --tag "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"

  # Linux wheels are built inside manylinux_2_28 containers via maturin-action.
  # We explicitly target manylinux 2_28; auto likely would too but pinning
  # avoids unexpected wheel renames. See https://github.com/pypa/manylinux.
  build-linux:
    name: "Linux ${{ matrix.target }}"
    runs-on: ubuntu-24.04
    needs: [check-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - target: aarch64-unknown-linux-gnu
            manylinux: "2_28"

    steps:
      - uses: actions/checkout@v4

      # maturin-action runs inside a manylinux container for Linux builds.
      # We need both stable (for the extension) and nightly (for wasiless /
      # componentize-py which requires wasm32-wasip1 + rust-src).
      # The before-script-linux hook runs inside the container before maturin.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # Pinned to avoid wasm32-wasip2 semver issues with newer stable releases.
          rust-toolchain: ${{ env.RUST_STABLE }}
          rustup-components: "rustfmt,clippy"
          # abi3-py312 is set in [tool.maturin] features; no -i needed.
          args: --release --locked --compatibility pypi
          # Install nightly + wasm targets inside the container before the build.
          before-script-linux: |
            rustup toolchain install nightly --component rust-src
            rustup target add wasm32-wasip1 --toolchain nightly
            rustup target add wasm32-unknown-unknown

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: target/wheels/*.whl
          if-no-files-found: error

  # macOS wheels — native builds on GitHub-hosted runners.
  # macos-14 is Apple Silicon (aarch64); macos-13 is Intel (x86_64).
  build-macos:
    name: "macOS ${{ matrix.target }}"
    runs-on: ${{ matrix.runner }}
    needs: [check-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_STABLE }}
          target: wasm32-unknown-unknown
          components: rustfmt,clippy
          cache: false

      - name: Set up nightly Rust toolchain with rust-src
        run: |
          rustup toolchain install nightly --component rust-src
          rustup target add wasm32-wasip1 --toolchain nightly

      # Cache Rust registry/git sources — keyed on Cargo.lock only so they
      # are shared across runs with the same lockfile.
      - name: Cache Rust sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: cargo-sources-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: |
            cargo-sources-${{ runner.os }}-

      # Build artifacts keyed on Cargo.lock + toolchain to avoid incompatible
      # artifact reuse across toolchain upgrades.
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ env.RUST_STABLE }}-v1
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ matrix.target }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.target }}
          # container: off is implied for non-Linux but set explicitly for clarity.
          container: "off"
          # abi3-py312 is set in [tool.maturin] features; no -i needed.
          args: --release --locked

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: target/wheels/*.whl
          if-no-files-found: error

  # Windows wheel — native build on windows-latest (x86_64).
  # Windows support is currently untested; this is a hard failure intentionally
  # so that any Windows-specific build issues surface immediately.
  build-windows:
    name: "Windows x86_64"
    runs-on: windows-latest
    needs: [check-version]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_STABLE }}
          target: wasm32-unknown-unknown
          components: rustfmt,clippy
          cache: false

      - name: Set up nightly Rust toolchain with rust-src
        run: |
          rustup toolchain install nightly --component rust-src
          rustup target add wasm32-wasip1 --toolchain nightly

      - name: Cache Rust sources
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            ~\.cargo\git\checkouts\
          key: cargo-sources-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: |
            cargo-sources-${{ runner.os }}-

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: target\
          key: cargo-target-${{ runner.os }}-x86_64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}-${{ env.RUST_STABLE }}-v1
          restore-keys: |
            cargo-target-${{ runner.os }}-x86_64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-x86_64-pc-windows-msvc-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: x86_64-pc-windows-msvc
          container: "off"
          # abi3-py312 is set in [tool.maturin] features; no -i needed.
          args: --release --locked

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: target/wheels/*.whl
          if-no-files-found: error

  # Collect all wheels into a single artifact for convenient download.
  collect-wheels:
    name: "Collect all wheels"
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: List collected wheels
        run: ls -lh dist/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist/*.whl
          if-no-files-found: error

  # Create a GitHub Release and attach all wheels.
  # Only runs on tag pushes — workflow_dispatch builds stop at collect-wheels,
  # leaving wheels as Actions artifacts for download and local testing.
  create-github-release:
    name: "Create GitHub Release"
    needs: [collect-wheels]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # Required to create releases and upload assets.

    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          name: all-wheels
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" dist/*.whl \
            --title "$TAG" \
            --prerelease \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
